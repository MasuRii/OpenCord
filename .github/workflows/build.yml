name: Release
on:
    push:
        branches:
            - main

env:
    FORCE_COLOR: true
    REPO: Equicord/Equibored
    USERNAME: GitHub-Actions

permissions:
    contents: write

jobs:
    InstallerLinux:
        name: Build Linux installer
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout Equilotl
              uses: actions/checkout@v6
              with:
                  repository: Equicord/Equilotl
                  path: Equilotl

            - name: Checkout OpenCord
              uses: actions/checkout@v6
              with:
                  path: OpenCord

            - name: Patch installer source and resources
              run: node OpenCord/scripts/patchEquilotlBranding.mjs Equilotl OpenCord/assets/branding

            - name: Install Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.2"
                  cache-dependency-path: Equilotl/go.sum

            - name: Install Linux dependencies
              run: |
                  sudo apt update
                  sudo apt install -y pkg-config libsdl2-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libglx-dev libgl1-mesa-dev libxxf86vm-dev libglfw3-dev libwayland-dev libwayland-egl1 libegl-dev libxkbcommon-dev wayland-protocols extra-cmake-modules

            - name: Build Linux installers
              working-directory: Equilotl
              run: |
                  go get -v
                  go mod vendor
                  git apply patches/wayland.patch
                  CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -v -tags static -ldflags "-s -w -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'equilotl/buildinfo.InstallerTag=opencord'" -o OpenCord-x11
                  CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -v -tags "cli" -ldflags "-s -w -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'equilotl/buildinfo.InstallerTag=opencord'" -o OpenCordCli-linux
                  chmod +x OpenCord-x11 OpenCordCli-linux

            - name: Upload Linux installer artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: opencord-installers-linux
                  path: |
                      Equilotl/OpenCord-x11
                      Equilotl/OpenCordCli-linux

    InstallerWindows:
        name: Build Windows installer
        runs-on: windows-latest

        steps:
            - name: Checkout Equilotl
              uses: actions/checkout@v6
              with:
                  repository: Equicord/Equilotl
                  path: Equilotl

            - name: Checkout OpenCord
              uses: actions/checkout@v6
              with:
                  path: OpenCord

            - name: Patch installer source and resources
              run: node OpenCord/scripts/patchEquilotlBranding.mjs Equilotl OpenCord/assets/branding

            - name: Install Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.2"
                  cache-dependency-path: Equilotl/go.sum

            - name: Setup MSYS2
              uses: msys2/setup-msys2@v2
              with:
                  path-type: inherit

            - name: Build Windows installers
              shell: msys2 {0}
              working-directory: Equilotl
              run: |
                  pacman -S --noconfirm git mingw-w64-x86_64-gcc mingw-w64-x86_64-SDL2
                  go get -v
                  go install github.com/tc-hib/go-winres@latest
                  go-winres make --product-version "git-tag"
                  CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -v -tags "static gui" -ldflags "-s -w -H=windowsgui -extldflags=-static -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'equilotl/buildinfo.InstallerTag=opencord'" -o OpenCordInstaller.exe
                  CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -v -tags "cli" -ldflags "-s -w -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'equilotl/buildinfo.InstallerTag=opencord'" -o OpenCordInstallerCli.exe

            - name: Upload Windows installer artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: opencord-installers-windows
                  path: |
                      Equilotl/OpenCordInstaller.exe
                      Equilotl/OpenCordInstallerCli.exe

    InstallerMac:
        name: Build macOS installer
        runs-on: ${{ matrix.runner }}
        strategy:
            matrix:
                include:
                    - arch: amd64
                      runner: macos-15-intel
                      gui_name: OpenCord-darwin-x64.zip
                      cli_name: OpenCordCli-darwin-x64
                    - arch: arm64
                      runner: macos-latest
                      gui_name: OpenCord-darwin-arm64.zip
                      cli_name: OpenCordCli-darwin-arm64

        steps:
            - name: Checkout Equilotl
              uses: actions/checkout@v6
              with:
                  repository: Equicord/Equilotl
                  path: Equilotl

            - name: Checkout OpenCord
              uses: actions/checkout@v6
              with:
                  path: OpenCord

            - name: Patch installer source and resources
              run: node OpenCord/scripts/patchEquilotlBranding.mjs Equilotl OpenCord/assets/branding

            - name: Install Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.2"
                  cache-dependency-path: Equilotl/go.sum

            - name: Install dependencies
              run: brew install sdl2

            - name: Build macOS installers
              working-directory: Equilotl
              run: |
                  go get -v
                  CGO_CFLAGS="-mmacosx-version-min=10.15" CGO_LDFLAGS="-mmacosx-version-min=10.15" CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} go build -v -tags "static gui" -ldflags "-s -w -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'equilotl/buildinfo.InstallerTag=opencord'" -o OpenCordInstaller
                  CGO_CFLAGS="-mmacosx-version-min=10.15" CGO_LDFLAGS="-mmacosx-version-min=10.15" CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} go build -v -tags "cli" -ldflags "-s -w -X 'equilotl/buildinfo.InstallerGitHash=$(git rev-parse --short HEAD)' -X 'equilotl/buildinfo.InstallerTag=opencord'" -o ${{ matrix.cli_name }}
                  mkdir -p OpenCordInstaller.app/Contents/MacOS OpenCordInstaller.app/Contents/Resources
                  cp macos/Info.plist OpenCordInstaller.app/Contents/Info.plist
                  mv OpenCordInstaller OpenCordInstaller.app/Contents/MacOS/OpenCordInstaller
                  cp macos/icon.icns OpenCordInstaller.app/Contents/Resources/icon.icns
                  zip -r ${{ matrix.gui_name }} OpenCordInstaller.app

            - name: Upload macOS installer artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: opencord-installers-macos-${{ matrix.arch }}
                  path: |
                      Equilotl/${{ matrix.gui_name }}
                      Equilotl/${{ matrix.cli_name }}

    Build:
        name: Build OpenCord
        runs-on: ubuntu-latest
        needs: [InstallerLinux, InstallerWindows, InstallerMac]

        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateEquicordPluginJson dist/equicordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Download installer artifacts
              uses: actions/download-artifact@v8
              with:
                  pattern: opencord-installers-*
                  path: dist/installer-assets
                  merge-multiple: true

            - name: Collect files to be released
              run: |
                  cd dist
                  mkdir release

                  cp browser/browser.* release
                  cp OpenCord.user.{js,js.LEGAL.txt} release
                  cp ../misc/install.sh release/install.sh
                  cp installer-assets/* release

                  # copy the plugin data jsons, the extension zips and the desktop/equibop asars
                  cp *.{json,zip,asar} release

                  # legacy un-asared files
                  cp desktop/* release
                  for file in equibop/*; do
                    filename=$(basename "$file")
                    cp "$file" "release/equibop${filename^}"
                  done

                  find release -size 0 -delete
                  rm release/package.json
                  rm release/*.map

            - name: Generate release notes
              run: node scripts/generateReleaseNotes.mjs > dist/release-notes.md

            - name: Publish GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  VERSION="v$(jq -r .version < package.json)"

                  git fetch --tags origin

                  if ! git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
                      git tag "$VERSION"
                      git push origin "$VERSION"
                  fi

                  if gh release view "$VERSION" >/dev/null 2>&1; then
                      gh release edit "$VERSION" --title "$VERSION" --notes-file dist/release-notes.md --latest
                  else
                      gh release create "$VERSION" --title "$VERSION" --notes-file dist/release-notes.md --latest
                  fi

                  gh release upload "$VERSION" --clobber dist/release/*

            - name: Generate latest.json installer fallback
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  VERSION="v$(jq -r .version < package.json)"
                  gh api "repos/${{ github.repository }}/releases/tags/${VERSION}" > dist/release/latest.json

            - name: Upload latest.json installer fallback
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  VERSION="v$(jq -r .version < package.json)"
                  gh release upload "$VERSION" --clobber dist/release/latest.json

            - name: Upload Plugin JSONs to Equibored repo
              if: github.repository == 'Equicord/Equicord' && vars.ACT == 'false'
              env:
                  GITHUB_TOKEN: ${{ secrets.ETOKEN }}
              run: |
                  git config --global user.name "GitHub-Actions"
                  git config --global user.email actions@github.com
                  git clone https://$USERNAME:$GITHUB_TOKEN@github.com/$REPO.git plugins
                  cd plugins

                  cp ../dist/release/*plugins.json .
                  cp ../dist/release/devs.json .
                  git add -A

                  git commit -m "Plugins for https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA"
                  git push --force https://$USERNAME:$GITHUB_TOKEN@github.com/$REPO.git
