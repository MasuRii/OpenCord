name: Plugin Sync

on:
    schedule:
        - cron: "0 6 * * *"
    workflow_dispatch:
        inputs:
            source:
                description: "Source to sync"
                required: true
                default: "all"
                type: choice
                options:
                    - all
                    - illegalcord
                    - testcord
                    - esharq
                    - equicordplus
                    - mallcord
            force_resync:
                description: "Force full resync of tracked plugins"
                required: false
                default: false
                type: boolean

env:
    FORCE_COLOR: true

permissions:
    contents: write
    pull-requests: write

jobs:
    sync:
        name: Sync ${{ matrix.source }}
        runs-on: ubuntu-latest
        concurrency:
            group: plugin-sync-${{ matrix.source }}
            cancel-in-progress: true
        strategy:
            fail-fast: false
            matrix:
                source: [illegalcord, testcord, esharq, equicordplus, mallcord]

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Check if source should run
              id: should_run
              run: |
                  if [ "${{ github.event_name }}" = "schedule" ]; then
                      echo "should_run=true" >> $GITHUB_OUTPUT
                  elif [ "${{ github.event.inputs.source }}" = "all" ] || [ "${{ github.event.inputs.source }}" = "${{ matrix.source }}" ]; then
                      echo "should_run=true" >> $GITHUB_OUTPUT
                  else
                      echo "should_run=false" >> $GITHUB_OUTPUT
                  fi

            - name: Read source config
              id: config
              if: steps.should_run.outputs.should_run == 'true'
              run: |
                  NAME="${{ matrix.source }}"
                  CONFIG_FILE=".github/plugin-sync-config.json"
                  REPO=$(jq -r --arg name "$NAME" '.sources[] | select(.name == $name) | .repo' "$CONFIG_FILE")
                  BRANCH=$(jq -r --arg name "$NAME" '.sources[] | select(.name == $name) | .branch' "$CONFIG_FILE")
                  LOCAL_DIR=$(jq -r --arg name "$NAME" '.sources[] | select(.name == $name) | .local_dir' "$CONFIG_FILE")
                  UPSTREAM_DIRS_JSON=$(jq -c --arg name "$NAME" '.sources[] | select(.name == $name) | .upstream_dirs' "$CONFIG_FILE")
                  echo "repo=$REPO" >> $GITHUB_OUTPUT
                  echo "branch=$BRANCH" >> $GITHUB_OUTPUT
                  echo "local_dir=$LOCAL_DIR" >> $GITHUB_OUTPUT
                  echo "upstream_dirs_json=$UPSTREAM_DIRS_JSON" >> $GITHUB_OUTPUT

            - name: Read local sync state
              id: local_state
              if: steps.should_run.outputs.should_run == 'true'
              run: |
                  STATE_FILE=".github/sync-state/${{ matrix.source }}.sha"
                  if [ -f "$STATE_FILE" ]; then
                      echo "sha=$(cat "$STATE_FILE")" >> $GITHUB_OUTPUT
                  else
                      echo "sha=" >> $GITHUB_OUTPUT
                  fi

            - name: Fetch upstream HEAD
              id: upstream
              if: steps.should_run.outputs.should_run == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  SHA=$(curl -sSL --fail \
                      -H "Authorization: Bearer $GH_TOKEN" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/${{ steps.config.outputs.repo }}/git/refs/heads/${{ steps.config.outputs.branch }}" \
                      | jq -r '.object.sha // empty')
                  if [ -z "$SHA" ]; then
                      echo "Failed to fetch upstream HEAD" >&2
                      exit 1
                  fi
                  echo "sha=$SHA" >> $GITHUB_OUTPUT

            - name: Detect changes
              id: detect
              if: steps.should_run.outputs.should_run == 'true'
              run: |
                  LOCAL_SHA="${{ steps.local_state.outputs.sha }}"
                  UPSTREAM_SHA="${{ steps.upstream.outputs.sha }}"
                  FORCE="${{ github.event.inputs.force_resync || 'false' }}"

                  if [ "$FORCE" = "true" ]; then
                      echo "has_changes=true" >> $GITHUB_OUTPUT
                      echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
                      exit 0
                  fi

                  if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ]; then
                      echo "has_changes=false" >> $GITHUB_OUTPUT
                      echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
                  else
                      echo "has_changes=true" >> $GITHUB_OUTPUT
                      echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
                  fi

            - uses: pnpm/action-setup@v6
              if: steps.detect.outputs.has_changes == 'true'

            - name: Use Node.js 24
              if: steps.detect.outputs.has_changes == 'true'
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Install dependencies
              if: steps.detect.outputs.has_changes == 'true'
              run: pnpm install --frozen-lockfile

            - name: Clone upstream
              if: steps.detect.outputs.has_changes == 'true'
              run: |
                  git clone --depth 1 \
                      "https://github.com/${{ steps.config.outputs.repo }}.git" \
                      upstream-temp

            - name: Stage plugins and check file types
              id: stage
              if: steps.detect.outputs.has_changes == 'true'
              env:
                  UPSTREAM_DIRS_JSON: ${{ steps.config.outputs.upstream_dirs_json }}
                  LOCAL_DIR: ${{ steps.config.outputs.local_dir }}
              run: |
                  LOCAL="$LOCAL_DIR"
                  mkdir -p "$LOCAL"
                  CHANGED_FILE=$(mktemp)
                  declare -A UPSTREAM_MAP
                  shopt -s nullglob

                  sync_plugin() {
                      local plugin_dir="$1"
                      local plugin_name="$2"
                      UPSTREAM_MAP["$plugin_name"]=1
                      dest="$LOCAL/$plugin_name"
                      if [ -d "$dest" ]; then
                          if ! diff -qr "$plugin_dir" "$dest" >/dev/null 2>&1; then
                              rm -rf "$dest"
                              cp -r "$plugin_dir" "$dest"
                              echo "$plugin_name" >> "$CHANGED_FILE"
                          fi
                      else
                          cp -r "$plugin_dir" "$dest"
                          echo "+$plugin_name" >> "$CHANGED_FILE"
                      fi
                  }

                  while IFS= read -r upstream_dir; do
                      UPSTREAM="upstream-temp/$upstream_dir"
                      if [ ! -d "$UPSTREAM" ]; then
                          echo "Warning: upstream directory $upstream_dir not found" >&2
                          continue
                      fi

                      # If the upstream path itself contains a plugin entry file,
                      # treat it as a single plugin directory rather than a container.
                      if [ -f "$UPSTREAM/index.ts" ] || [ -f "$UPSTREAM/index.tsx" ]; then
                          plugin_name=$(basename "$UPSTREAM")
                          sync_plugin "$UPSTREAM" "$plugin_name"
                      else
                          for plugin_dir in "$UPSTREAM"/*/; do
                              [ -d "$plugin_dir" ] || continue
                              plugin_name=$(basename "$plugin_dir")
                              sync_plugin "$plugin_dir" "$plugin_name"
                          done
                      fi
                  done < <(echo "$UPSTREAM_DIRS_JSON" | jq -r '.[]')

                  for local_plugin in "$LOCAL"/*/; do
                      [ -d "$local_plugin" ] || continue
                      plugin_name=$(basename "$local_plugin")
                      if [ -z "${UPSTREAM_MAP[$plugin_name]+x}" ]; then
                          echo "-$plugin_name" >> "$CHANGED_FILE"
                      fi
                  done

                  while read -r f; do
                      fname=$(basename "$f")
                      case "$fname" in
                          *.ts|*.tsx|*.js|*.mjs|*.css|*.scss|*.less|*.styl|*.json|*.md|*.MD|*.mdx|*.MDX|*.txt|*.html|*.htm|*.yml|*.yaml|*.YML|*.YAML) ;;
                          *.py|*.node) ;;
                          *.png|*.jpg|*.jpeg|*.gif|*.svg|*.webp|*.ico|*.PNG|*.JPG|*.JPEG|*.GIF|*.SVG|*.WEBP|*.ICO) ;;
                          *.ttf|*.woff|*.woff2|*.otf|*.eot) ;;
                          *.mp3|*.wav|*.ogg|*.flac) ;;
                          *.gitignore|*.gitattributes|*.prettierignore|*.eslintignore) ;;
                          LICENSE|LICENCE|COPYING|README|README.md|README.MD) ;;
                          *)
                              echo "Blocked unsafe file type: $f" >&2
                              exit 1
                              ;;
                      esac
                  done < <(find "$LOCAL" -type f)

                  if find "$LOCAL" -type l | grep -q .; then
                      echo "Blocked: symlinks are not allowed" >&2
                      exit 1
                  fi

                  if [ ! -s "$CHANGED_FILE" ]; then
                      echo "has_plugin_changes=false" >> $GITHUB_OUTPUT
                  else
                      echo "has_plugin_changes=true" >> $GITHUB_OUTPUT
                      {
                          echo "plugins<<EOF"
                          sort -u "$CHANGED_FILE"
                          echo "EOF"
                      } >> $GITHUB_OUTPUT
                  fi

            # ──────────────────────────────────────────────────────────────
            # Build-quarantine loop: build once; if it fails, parse the esbuild
            # errors to find which plugin(s) broke it, move them aside, and
            # retry. Broken plugins are skipped (quarantined) and listed in the
            # PR body for manual review. Only passing plugins make it into the PR.
            # ──────────────────────────────────────────────────────────────
            - name: Build-quarantine loop
              id: quarantine
              if: steps.stage.outputs.has_plugin_changes == 'true'
              env:
                  LOCAL_DIR: ${{ steps.config.outputs.local_dir }}
              run: |
                  QUARANTINE_DIR=".github/sync-quarantine/${{ matrix.source }}"
                  rm -rf "$QUARANTINE_DIR"
                  mkdir -p "$QUARANTINE_DIR"
                  QUARANTINE_LIST="$QUARANTINE_DIR/quarantined.txt"
                  : > "$QUARANTINE_LIST"
                  MAX_ROUNDS=50
                  round=0

                  while [ $round -lt $MAX_ROUNDS ]; do
                      round=$((round + 1))
                      echo "::group::Build round $round"

                      LOG=$(mktemp)
                      if pnpm buildStandalone > "$LOG" 2>&1; then
                          echo "Build passed on round $round."
                          echo "::endgroup::"
                          break
                      fi

                      # Parse esbuild errors for offending plugin paths.
                      # esbuild errors look like:
                      #   src/<collection>/<plugin>/file.ts:LINE:COL: ERROR: ...
                      BROKEN=$(grep -oE 'src/[A-Za-z0-9_+.-]+/[A-Za-z0-9_+.-]+/[A-Za-z0-9_./-]+\.(ts|tsx|js|jsx)' "$LOG" \
                          | sed -E 's|^src/[^/]+/||; s|/.*||' \
                          | sort -u)

                      if [ -z "$BROKEN" ]; then
                          echo "Build failed but no plugin file could be identified from errors."
                          cat "$LOG"
                          echo "::endgroup::"
                          echo "build_ok=false" >> $GITHUB_OUTPUT
                          exit 1
                      fi

                      quarantined_this_round=0
                      for plugin in $BROKEN; do
                          if [ ! -d "$LOCAL_DIR/$plugin" ]; then
                              continue
                          fi
                          echo "Quarantining broken plugin: $plugin"
                          git rm -r --quiet "$LOCAL_DIR/$plugin" 2>/dev/null || rm -rf "$LOCAL_DIR/$plugin"
                          echo "$plugin" >> "$QUARANTINE_LIST"
                          quarantined_this_round=$((quarantined_this_round + 1))
                      done

                      if [ $quarantined_this_round -eq 0 ]; then
                          echo "Build failed and no new plugins could be quarantined. Aborting."
                          cat "$LOG"
                          echo "::endgroup::"
                          echo "build_ok=false" >> $GITHUB_OUTPUT
                          exit 1
                      fi

                      echo "::endgroup::"
                  done

                  if [ $round -ge $MAX_ROUNDS ]; then
                      echo "Reached max quarantine rounds ($MAX_ROUNDS)."
                      echo "build_ok=false" >> $GITHUB_OUTPUT
                      exit 1
                  fi

                  echo "build_ok=true" >> $GITHUB_OUTPUT

                  # Collect quarantined plugin names (if any) for the PR body.
                  if [ -s "$QUARANTINE_LIST" ]; then
                      QUARANTINED=$(sort -u "$QUARANTINE_LIST" | grep -v '^$' || true)
                      {
                          echo "quarantined<<EOF"
                          echo "$QUARANTINED"
                          echo "EOF"
                      } >> $GITHUB_OUTPUT
                  else
                      echo "quarantined=" >> $GITHUB_OUTPUT
                  fi

            - name: Verify plugin structure
              if: steps.stage.outputs.has_plugin_changes == 'true' && steps.quarantine.outputs.build_ok == 'true'
              run: |
                  pnpm generatePluginJson /tmp/plugins.json || echo "::warning::Plugin structure check failed; review before merging."
                  pnpm generateEquicordPluginJson /tmp/equicordplugins.json || true
                  pnpm generateVencordPluginJson /tmp/vencordplugins.json || true

            # ──────────────────────────────────────────────────────────────
            # Commit each changed plugin as its own commit for clean history.
            # ──────────────────────────────────────────────────────────────
            - name: Commit plugins (one per plugin)
              id: commit
              if: steps.stage.outputs.has_plugin_changes == 'true' && steps.quarantine.outputs.build_ok == 'true'
              env:
                  LOCAL_DIR: ${{ steps.config.outputs.local_dir }}
                  SOURCE: ${{ matrix.source }}
                  REPO: ${{ steps.config.outputs.repo }}
                  UPSTREAM_SHA: ${{ steps.detect.outputs.upstream_sha }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  # The staging step already copied files into the worktree.
                  # Commit deleted (upstream-removed) plugins first.
                  DELETED=$(git status --porcelain -- "$LOCAL_DIR" | grep '^ D' | sed -E "s|^ D ||" || true)
                  if [ -n "$DELETED" ]; then
                      git add -A -- "$LOCAL_DIR"
                      git commit -m "chore($SOURCE): remove plugins deleted upstream ($UPSTREAM_SHA)" -- "$LOCAL_DIR" 2>/dev/null || true
                  fi

                  # Commit each plugin directory individually.
                  COMMIT_COUNT=0
                  for plugin_dir in "$LOCAL_DIR"/*/; do
                      [ -d "$plugin_dir" ] || continue
                      plugin_name=$(basename "$plugin_dir")
                      git add -- "$plugin_dir"
                      if git diff --cached --quiet -- "$plugin_dir"; then
                          continue
                      fi
                      git commit -m "chore($SOURCE): sync $plugin_name from $REPO ($UPSTREAM_SHA)" -- "$plugin_dir"
                      COMMIT_COUNT=$((COMMIT_COUNT + 1))
                  done

                  echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

            - name: Update sync state
              if: steps.detect.outputs.has_changes == 'true' && steps.quarantine.outputs.build_ok == 'true'
              run: |
                  mkdir -p .github/sync-state
                  echo "${{ steps.detect.outputs.upstream_sha }}" > ".github/sync-state/${{ matrix.source }}.sha"
                  git add ".github/sync-state/${{ matrix.source }}.sha"
                  git commit -m "chore(${{ matrix.source }}): update sync state to ${{ steps.detect.outputs.upstream_sha }}" || true

            - name: Clean up scratch dirs
              if: steps.stage.outputs.has_plugin_changes == 'true' && steps.quarantine.outputs.build_ok == 'true'
              run: |
                  rm -rf upstream-temp .github/sync-quarantine

            - name: Create or update PR
              if: steps.stage.outputs.has_plugin_changes == 'true' && steps.quarantine.outputs.build_ok == 'true'
              uses: peter-evans/create-pull-request@v8
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  branch: "sync/${{ matrix.source }}"
                  delete-branch: true
                  title: "[AutoUpdate] ${{ matrix.source }}: plugin sync (${{ steps.detect.outputs.upstream_sha }})"
                  body: |
                      ## Automated Plugin Sync — ${{ matrix.source }}

                      **Upstream:** `${{ steps.config.outputs.repo }}`
                      **Upstream SHA:** `${{ steps.detect.outputs.upstream_sha }}`
                      **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                      **Commits:** One commit per synced plugin (${{ steps.commit.outputs.commit_count }} total)

                      ### Build Verification
                      All plugins in this PR passed `pnpm buildStandalone` (esbuild). The build is the hard gate: only plugins that compile are included.

                      ### Quarantined Plugins (skipped, need manual review)
                      ${{ steps.quarantine.outputs.quarantined }}

                      Quarantined plugins failed the build and were excluded from this PR. They are saved in `.github/sync-quarantine/${{ matrix.source }}/` for manual review. Fix the upstream type/import errors and re-sync individually.

                      ### Plugins Affected
                      ${{ steps.stage.outputs.plugins }}

                      ### Type-checking
                      `tsc --noEmit` is advisory on `main`. Upstream plugins may have type errors that do not affect the build. See the Test workflow logs for type-check warnings.

                      ### Review Checklist
                      - [ ] No unexpected network endpoints added
                      - [ ] No eval/new Function or arbitrary code execution
                      - [ ] Patches target only Discord internals, not user data exfiltration
                      - [ ] Quarantined plugins reviewed or intentionally skipped
